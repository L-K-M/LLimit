name: LLimit
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  QuotaCore:
    path: Packages/QuotaCore

targets:
  LLimitApp:
    type: application
    platform: macOS
    sources:
      - path: LLimitApp
        excludes:
          - Info.plist
      - path: Shared
    dependencies:
      - package: QuotaCore
      - target: LLimitWidgetExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.lkmc.llimit.app
        PRODUCT_NAME: LLimit
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: LLimitApp/LLimitApp.entitlements
        MACOSX_DEPLOYMENT_TARGET: 14.0
        REGISTER_WITH_LAUNCH_SERVICES: NO
        CURRENT_PROJECT_VERSION: 10
        MARKETING_VERSION: 0.2.0
    info:
      path: LLimitApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        AppGroupIdentifier: $(TeamIdentifierPrefix)group.ch.lkmc.llimit
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSPrincipalClass: NSApplication

  LLimitWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: LLimitWidgetExtension
        excludes:
          - Info.plist
      - path: Shared
    dependencies:
      - package: QuotaCore
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.lkmc.llimit.app.widgetextension
        PRODUCT_NAME: LLimitWidgetExtension
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: LLimitWidgetExtension/LLimitWidgetExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        MACOSX_DEPLOYMENT_TARGET: 14.0
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 10
        MARKETING_VERSION: 0.2.0
    info:
      path: LLimitWidgetExtension/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        AppGroupIdentifier: $(TeamIdentifierPrefix)group.ch.lkmc.llimit
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: "XPC!"
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  LLimitApp:
    build:
      targets:
        LLimitApp: all
        LLimitWidgetExtension: all
    run:
      config: Debug
