name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without the leading v), e.g. 0.2.1"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Building LLimit $v"

      # Optional: import a Developer ID Application certificate so the build is
      # signed + notarized. Skipped automatically if the secret is not set, in
      # which case an ad-hoc (local-use) build is produced instead.
      - name: Import Developer ID certificate
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' }}
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: scripts/build.sh --version "${{ steps.version.outputs.value }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          TAG="v${{ steps.version.outputs.value }}"
          files=(dist/*.zip dist/*.dmg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts found in dist/" >&2
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --clobber
          else
            gh release create "$TAG" "${files[@]}" \
              --title "LLimit $TAG" \
              --generate-notes
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LLimit-${{ steps.version.outputs.value }}
          path: dist/*
          if-no-files-found: error
